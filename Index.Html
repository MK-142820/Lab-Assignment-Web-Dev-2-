<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Event Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="header">
        <h1>Smart Event Dashboard</h1>
        <button onclick="toggleDarkMode()">🌙</button>
    </div>

    <input type="text" id="search" placeholder="Search events..." onkeyup="searchEvent()">

    <div class="container">

        <!-- Add Event -->
        <div class="card">
            <h2>Add / Edit Event</h2>

            <input type="text" id="title" placeholder="Event Title">
            <input type="date" id="date">

            <select id="category">
                <option>Workshop</option>
                <option>Meeting</option>
                <option>Personal</option>
            </select>

            <textarea id="desc" placeholder="Description"></textarea>

            <button onclick="addEvent()">Save Event</button>
        </div>

        <!-- Events List -->
        <div class="card">
            <div class="top-bar">
                <h2>My Events</h2>
                <button onclick="clearAll()">Clear All</button>
            </div>

            <div id="eventList"></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
